<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Team Management</title>
  <link rel="stylesheet" href="teams.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>My Teams</h1>
    </div>

    <nav class="nav-bar">
      <button class="nav-button" data-target="info-form">Get My Teams</button>
      <button class="nav-button" data-target="create-form">Create</button>
      <button class="nav-button" data-target="update-form">Update</button>
      <button class="nav-button" data-target="delete-form">Delete</button>
    </nav>

    <div class="form-section" id="info-form">
      <h2>Team List</h2>

      <!-- Section to show currently assigned team -->
      <div id="assigned-team-section" style="margin-bottom: 20px;">
        <h3>Currently Assigned Team</h3>
        <div id="assigned-team-container">
          <p>No team currently assigned.</p>
        </div>
      </div>

      <!-- All team cards will be inserted here -->
      <div id="team-list"></div>
    </div>

    <div class="form-section" id="create-form" style="display: none;">
      <h2>Create Team</h2>
      <form id="team-create-form">
        <input type="text" name="name" placeholder="Team Name" required />
        <button type="submit">Create</button>
      </form>
    </div>

    <div class="form-section" id="update-form" style="display: none;">
      <h2>Update Team</h2>
      <form id="team-update-form">
        <input type="text" id="update-team-id" name="id" placeholder="Team ID" readonly required />
        <input type="text" name="name" placeholder="New Team Name" required />
        <button type="submit">Update</button>
      </form>
    </div>

    <div class="form-section" id="delete-form" style="display: none;">
      <h2>Delete Team</h2>
      <form id="team-delete-form">
        <input type="text" id="delete-team-id" name="id" placeholder="Team ID" readonly required />
        <button type="submit">Delete</button>
      </form>
    </div>
  </div>

  <script src="teams.js"></script>
</body>
</html>
